<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Code Package Scanner</title>
    <!-- เรียกใช้งาน Tailwind CSS เพื่อการแสดงผลที่สวยงามบนมือถือ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้งาน Library สแกน QR Code -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans select-none">

    <!-- Header -->
    <header class="bg-blue-600 text-white text-center py-4 px-3 shadow-md sticky top-0 z-50">
        <h1 class="text-xl font-bold">ระบบสแกนเช็คพัสดุ</h1>
        <p class="text-xs text-blue-100 mt-1">ตรวจสอบพัสดุก่อนจัดส่งขนส่ง</p>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
        
        <!-- ส่วนแสดงกล้องสแกน -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
            <h2 class="text-sm font-semibold text-gray-700 mb-2 flex justify-between items-center">
                <span>กล้องสแกน QR Code / Barcode</span>
                <span id="camera-status" class="text-xs text-red-500 font-normal">กล้องปิดอยู่</span>
            </h2>
            
            <!-- กรอบแสดงกล้องสแกน -->
            <div id="reader" class="overflow-hidden rounded-lg bg-black" style="min-height: 250px;"></div>
            
            <div class="grid grid-cols-2 gap-2 mt-3">
                <button id="btn-start" onclick="startScanner()" class="bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition-colors shadow">
                    เปิดกล้อง
                </button>
                <button id="btn-stop" onclick="stopScanner()" class="bg-red-500 hover:bg-red-600 text-white font-medium py-2.5 px-4 rounded-lg text-sm transition-colors shadow" disabled>
                    ปิดกล้อง
                </button>
            </div>
        </div>

        <!-- ส่วนของตัวนับและเครื่องมือจัดการ -->
        <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-200">
            <div class="flex justify-between items-center border-b pb-3 mb-3">
                <div>
                    <span class="text-xs text-gray-500 uppercase tracking-wider">จำนวนที่สแกนแล้ว</span>
                    <div class="text-3xl font-black text-blue-600"><span id="scan-count">0</span> รายการ</div>
                </div>
                <div class="flex flex-col gap-1">
                    <button onclick="copyToClipboard()" class="bg-gray-800 hover:bg-gray-900 text-white text-xs font-medium py-1.5 px-3 rounded-md transition-colors">
                        คัดลอกทั้งหมด
                    </button>
                    <button onclick="clearHistory()" class="bg-gray-100 hover:bg-gray-200 text-red-600 text-xs font-medium py-1.5 px-3 rounded-md transition-colors border border-gray-200">
                        ล้างข้อมูลใหม่
                    </button>
                </div>
            </div>

            <!-- ข้อความแจ้งเตือนสถานะการสแกนล่าสุด -->
            <div id="status-message" class="text-center text-sm font-medium py-2 px-3 rounded-lg hidden mb-3"></div>

            <!-- รายการ Tracking ที่สแกนเสร็จแล้ว -->
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">ประวัติการสแกนล่าสุด (เรียงจากใหม่สุด)</h3>
            <div id="scan-list" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                <!-- รายการจะถูกแทรกเข้ามาตรงนี้ผ่าน JavaScript -->
                <p id="empty-state" class="text-sm text-gray-400 text-center py-6">ยังไม่มีประวัติการสแกน</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs text-gray-400 bg-gray-50 border-t mt-auto">
        QR Code Scanner Mobile Web App
    </footer>

    <script>
        // กำหนดตัวแปรหลักสำหรับเก็บข้อมูล
        let scannedItems = [];
        let html5QrCode = null;
        let lastScannedText = "";
        let scanCooldown = false; // ป้องกันการสแกนซ้ำในทันที

        // เมื่อเปิดหน้าเว็บให้ดึงข้อมูลเก่าจาก LocalStorage (ถ้ามี)
        window.onload = function() {
            const savedData = localStorage.getItem("scanned_trackings");
            if (savedData) {
                scannedItems = JSON.parse(savedData);
                updateUI();
            }
        };

        // ฟังก์ชันสร้างเสียงบี๊บเพื่อแจ้งเตือนสแกนสำเร็จ (Web Audio API)
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.frequency.value = 880; // ระดับเสียงบี๊บ
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15); // สิ้นสุดใน 0.15 วินาที
                
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) {
                console.log("Audio feedback failed: ", e);
            }
        }

        // เริ่มต้นใช้งานกล้อง
        function startScanner() {
            if (html5QrCode && html5QrCode.isScanning) return;

            document.getElementById("btn-start").disabled = true;
            document.getElementById("btn-stop").disabled = false;
            document.getElementById("camera-status").textContent = "กำลังเชื่อมต่อกล้อง...";
            document.getElementById("camera-status").className = "text-xs text-yellow-500 font-normal";

            html5QrCode = new Html5Qrcode("reader");
            
            // ตั้งค่าสแกนโดยใช้กล้องหลัง (facingMode: environment)
            const config = { 
                fps: 10, 
                qrbox: function(width, height) {
                    // ปรับขนาดกล่องสแกนให้เหมาะสมกับขนาดหน้าจอ
                    const minEdge = Math.min(width, height);
                    const size = Math.floor(minEdge * 0.7);
                    return { width: size, height: size };
                }
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess,
                onScanFailure
            ).then(() => {
                document.getElementById("camera-status").textContent = "กล้องทำงานอยู่";
                document.getElementById("camera-status").className = "text-xs text-green-500 font-semibold";
            }).catch(err => {
                showStatusMessage("ไม่สามารถเปิดกล้องได้: " + err, false);
                stopScanner();
            });
        }

        // หยุดใช้งานกล้อง
        function stopScanner() {
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
            
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById("camera-status").textContent = "กล้องปิดอยู่";
                    document.getElementById("camera-status").className = "text-xs text-red-500 font-normal";
                    html5QrCode = null;
                }).catch(err => {
                    console.error("Stop error", err);
                });
            } else {
                document.getElementById("camera-status").textContent = "กล้องปิดอยู่";
                document.getElementById("camera-status").className = "text-xs text-red-500 font-normal";
            }
        }

        // ทำงานเมื่อตรวจพบ QR Code / Barcode สำเร็จ
        function onScanSuccess(decodedText, decodedResult) {
            // ป้องกันการสแกนกล่องเดิมซ้ำแบบถี่เกินไป (คูลดาวน์ 1.5 วินาที)
            if (scanCooldown && decodedText === lastScannedText) {
                return;
            }

            lastScannedText = decodedText;
            scanCooldown = true;
            setTimeout(() => { scanCooldown = false; }, 1500);

            // ตรวจสอบว่าเคยสแกนรหัสนี้ไปแล้วหรือยัง
            const isDuplicate = scannedItems.some(item => item.code === decodedText);

            if (isDuplicate) {
                playBeep(); // เล่นเสียงเตือน
                // ทำเสียงสั้นๆ อีกครั้งเพื่อให้รู้ว่าสแกนซ้ำ
                setTimeout(playBeep, 150);
                showStatusMessage("รหัสนี้ถูกสแกนไปแล้ว: " + decodedText, false);
                return;
            }

            // เพิ่มรายการใหม่
            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            scannedItems.unshift({
                code: decodedText,
                time: timeString
            });

            // บันทึกลงในเครื่อง และส่งเสียง
            saveData();
            playBeep();
            updateUI();
            showStatusMessage("สแกนสำเร็จ: " + decodedText, true);
        }

        function onScanFailure(error) {
            // ปล่อยว่างไว้เพื่อไม่ให้แจ้งเตือนบ่อยเกินไปในขณะที่สแกนหาเป้าหมายไม่เจอ
        }

        // อัปเดตข้อมูลบนหน้าจอ
        function updateUI() {
            const countEl = document.getElementById("scan-count");
            const listEl = document.getElementById("scan-list");
            const emptyState = document.getElementById("empty-state");

            countEl.textContent = scannedItems.length;

            if (scannedItems.length === 0) {
                listEl.innerHTML = "";
                listEl.appendChild(emptyState);
                emptyState.classList.remove("hidden");
                return;
            }

            emptyState.classList.add("hidden");
            
            // วาดรายการประวัติใหม่
            listEl.innerHTML = "";
            scannedItems.forEach((item, index) => {
                const itemDiv = document.createElement("div");
                itemDiv.className = "flex justify-between items-center bg-gray-50 p-2.5 rounded-lg border border-gray-150 text-sm shadow-sm";
                
                itemDiv.innerHTML = `
                    <div class="flex flex-col min-w-0 pr-2">
                        <span class="font-semibold text-gray-800 break-all select-all">${item.code}</span>
                        <span class="text-xxs text-gray-400 mt-0.5">เวลา: ${item.time}</span>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-500 hover:text-red-700 font-bold px-2 text-xs flex-shrink-0">
                        ลบ
                    </button>
                `;
                listEl.appendChild(itemDiv);
            });
        }

        // ลบรายการสแกนออกเฉพาะรายการ
        function removeItem(index) {
            if (confirm("ต้องการลบรายการนี้ใช่หรือไม่?")) {
                scannedItems.splice(index, 1);
                saveData();
                updateUI();
            }
        }

        // ล้างประวัติทั้งหมด
        function clearHistory() {
            if (scannedItems.length === 0) return;
            if (confirm("คุณต้องการลบประวัติการสแกนทั้งหมดใช่หรือไม่?")) {
                scannedItems = [];
                saveData();
                updateUI();
                showStatusMessage("ล้างประวัติเรียบร้อยแล้ว", true);
            }
        }

        // คัดลอกรหัสพัสดุทั้งหมดไปยังคลิปบอร์ด
        function copyToClipboard() {
            if (scannedItems.length === 0) {
                alert("ไม่มีข้อมูลที่จะคัดลอก");
                return;
            }
            // รวบรวมข้อมูลทั้งหมดเว้นบรรทัด 1 แถวต่อ 1 รหัส
            const textToCopy = scannedItems.map(item => item.code).join('\n');
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("คัดลอกรหัสทั้งหมด (" + scannedItems.length + " รายการ) ไปยังคลิปบอร์ดแล้ว คุณสามารถไปกดวาง (Paste) ใน LINE หรือชีตได้เลย");
            }).catch(err => {
                alert("เกิดข้อผิดพลาดในการคัดลอก กรุณาลองตรวจสอบสิทธิ์เบราว์เซอร์");
            });
        }

        // บันทึกลงในเครื่อง
        function saveData() {
            localStorage.setItem("scanned_trackings", JSON.stringify(scannedItems));
        }

        // แสดงแถบสถานะแจ้งเตือนที่ด้านล่างของหน้าจอ
        function showStatusMessage(message, isSuccess) {
            const statusEl = document.getElementById("status-message");
            statusEl.textContent = message;
            statusEl.classList.remove("hidden");
            
            if (isSuccess) {
                statusEl.className = "text-center text-sm font-medium py-2.5 px-3 rounded-lg mb-3 bg-green-50 text-green-700 border border-green-200";
            } else {
                statusEl.className = "text-center text-sm font-medium py-2.5 px-3 rounded-lg mb-3 bg-red-50 text-red-700 border border-red-200";
            }
        }
    </script>
</body>
</html>
