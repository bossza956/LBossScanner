<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Code Package Scanner - iOS Stable</title>
    <!-- เรียกใช้งาน Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้งาน Library สแกน QR Code -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* ควบคุมความสูงเฉพาะกรอบนอกสุด (#camera-section) เพื่อไม่ให้เบียดปุ่มตกจอ */
        #camera-section {
            transition: height 0.3s ease-in-out;
            height: 0px; /* เริ่มต้นพับปิด */
        }
        
        /* ห้ามบังคับความสูงแบบ Fix ที่ตัวกล้องเพื่อป้องกันภาพเบี้ยว ซึ่งจะทำให้อ่านรหัสไม่ได้ */
        #reader {
            width: 100% !important;
            height: auto !important; /* ปล่อยให้สัดส่วนภาพเป็นธรรมชาติเพื่อให้ iOS สแกนติดง่าย */
            border: none !important;
            background-color: black !important;
        }
        
        /* ปลดล็อกการบังคับสัดส่วนวิดีโอ เพื่อให้พิกัดสแกนบน iPhone ทำงานได้ถูกต้องแม่นยำ */
        #reader video {
            width: 100% !important;
            height: auto !important;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen w-screen flex flex-col font-sans overflow-hidden transition-colors duration-150" id="body-container">

    <!-- 1. Header (ส่วนหัว) -->
    <header class="bg-blue-600 text-white py-3 px-4 shadow flex justify-between items-center flex-shrink-0 z-20">
        <div>
            <h1 class="text-lg font-bold">เช็คพัสดุ</h1>
            <p class="text-xxs text-blue-100">ตรวจสอบก่อนจัดส่ง</p>
        </div>
        <!-- ตัวนับจำนวน -->
        <div class="text-right">
            <div class="text-xxs text-blue-200 uppercase">สแกนแล้ว</div>
            <div class="text-2xl font-black"><span id="scan-count">0</span> รายการ</div>
        </div>
    </header>

    <!-- 2. แถบควบคุม (อยู่ด้านบนสุดใต้ Header การันตีปุ่มไม่ตกขอบจอแน่นอน) -->
    <div class="bg-white px-3 py-2.5 border-b flex justify-between items-center gap-2 flex-shrink-0 shadow-sm z-20">
        <div class="flex gap-1.5">
            <button id="btn-start" onclick="startScanner()" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 px-3.5 rounded-lg text-xs transition-colors shadow">
                เปิดกล้องสแกน
            </button>
            <button id="btn-stop" onclick="stopScanner()" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2.5 px-2.5 rounded-lg text-xs transition-colors shadow" disabled>
                ปิดกล้อง / พับจอ
            </button>
        </div>
        <div class="flex gap-1">
            <button onclick="copyToClipboard()" class="bg-gray-800 hover:bg-gray-900 text-white text-xs font-semibold py-2.5 px-2.5 rounded-md shadow">
                คัดลอก
            </button>
            <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold py-2.5 px-2 rounded-md shadow flex items-center gap-0.5">
                ออก Excel
            </button>
            <button onclick="clearHistory()" class="bg-gray-100 hover:bg-gray-200 text-red-600 border border-gray-200 text-xs font-semibold py-2.5 px-2 rounded-md">
                ล้างข้อมูล
            </button>
        </div>
    </div>

    <!-- 3. หน้าจอกล้องสแกน (ใช้การพับเก็บที่กรอบนอกสีดำ ส่วนตัวกล้องภายในรันสัดส่วนปกติ) -->
    <div id="camera-section" class="w-full bg-black flex-shrink-0 relative overflow-hidden z-10">
        <!-- ตัวแสดงกล้อง -->
        <div id="reader"></div>
        
        <!-- แถบแจ้งสถานะกล้องลอยทับบนกล้อง -->
        <div class="absolute top-2 left-2 bg-black/60 text-white text-xs px-2.5 py-1 rounded-full flex items-center gap-1.5 backdrop-blur-sm z-20">
            <span id="camera-dot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
            <span id="camera-status">ปิดอยู่</span>
        </div>
    </div>

    <!-- 4. ส่วนแสดงรายงานและประวัติพัสดุ (จะยืดแสดงผลเต็มจอทันทีเมื่อปิดกล้อง) -->
    <div class="flex-1 flex flex-col min-h-0 bg-gray-50">
        <!-- แสดงข้อความสถานะล่าสุด -->
        <div id="status-message" class="mx-4 mt-3 text-center text-xs font-semibold py-2 px-3 rounded-lg hidden flex-shrink-0"></div>

        <!-- รายการประวัติที่สแกนแล้ว -->
        <div class="flex-1 overflow-y-auto px-4 py-3">
            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">ประวัติการสแกน (รายการล่าสุดจะอยู่บนสุด)</h2>
            <div id="scan-list" class="space-y-2">
                <!-- รายการจะเพิ่มเข้ามาจาก JS -->
                <p id="empty-state" class="text-sm text-gray-400 text-center py-10">ยังไม่มีข้อมูล โปรดกดปุ่ม "เปิดกล้องสแกน" เพื่อเริ่มต้น</p>
            </div>
        </div>
    </div>

    <script>
        let scannedItems = [];
        let html5QrCode = null;
        let lastScannedText = "";
        let scanCooldown = false;
        let audioCtx = null;

        window.onload = function() {
            const savedData = localStorage.getItem("scanned_trackings");
            if (savedData) {
                scannedItems = JSON.parse(savedData);
                updateUI();
            }
        };

        // ฟังก์ชันปลดล็อกระบบเสียงสำหรับ iOS (ต้องทำงานเมื่อผู้ใช้กดปุ่มเปิดกล้อง)
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // ฟังก์ชันพูดแจ้งเตือน (Text-to-Speech)
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH';
                utterance.rate = 1.3;
                window.speechSynthesis.speak(utterance);
            }
        }

        // เสียงบี๊บเตือน
        function playBeep(isDouble = false) {
            try {
                initAudio(); // ตรวจสอบและปลดล็อกเสียงบน iOS
                
                function triggerBeep(timeOffset) {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.frequency.value = isDouble ? 500 : 1000;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + timeOffset);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeOffset + 0.1);
                    oscillator.start(audioCtx.currentTime + timeOffset);
                    oscillator.stop(audioCtx.currentTime + timeOffset + 0.1);
                }

                triggerBeep(0);
                if (isDouble) {
                    triggerBeep(0.12);
                }
            } catch (e) {
                console.log(e);
            }
        }

        // ฟังก์ชันในการ ยืด/หด หน้าต่างกล้องโดยควบคุมเฉพาะกล่องหุ้มด้านนอก
        function toggleCameraUI(show) {
            const cameraSection = document.getElementById("camera-section");
            if (show) {
                cameraSection.style.height = "250px"; // บังคับกรอบนอกให้สูงคงที่ 250px
            } else {
                cameraSection.style.height = "0px"; // พับเก็บกรอบนอก
            }
        }

        // เริ่มเปิดกล้อง
        function startScanner() {
            if (html5QrCode && html5QrCode.isScanning) return;

            initAudio(); // ปลดล็อก AudioContext ทันทีที่ผู้ใช้คลิกเปิดกล้องเพื่อให้ส่งเสียงได้สำเร็จบน iOS

            document.getElementById("btn-start").disabled = true;
            document.getElementById("btn-stop").disabled = false;
            document.getElementById("camera-status").textContent = "กำลังเปิด...";
            document.getElementById("camera-dot").className = "w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse";

            // 1. สั่งยืดหน้าต่างกรอบนอกลงมาเพื่อเตรียมแสดงผลกล้อง
            toggleCameraUI(true);

            // 2. หน่วงเวลาเล็กน้อย (300ms) ให้หน้าต่างขยายเสร็จสิ้น จากนั้นเปิดกล้องสแกน
            setTimeout(() => {
                html5QrCode = new Html5Qrcode("reader");
                
                const config = { 
                    fps: 15, 
                    qrbox: function(width, height) {
                        // ปรับกรอบโฟกัสสแกนเป็นสี่เหลี่ยมจัตุรัสขนาด 70% ของด้านที่แคบที่สุด เพื่อเสถียรภาพสูงสุดในการสแกนของ iOS
                        const size = Math.floor(Math.min(width, height) * 0.70);
                        return { width: size, height: size };
                    }
                };

                html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess,
                    onScanFailure
                ).then(() => {
                    document.getElementById("camera-status").textContent = "พร้อมใช้งาน";
                    document.getElementById("camera-dot").className = "w-2.5 h-2.5 rounded-full bg-green-500 animate-ping";
                }).catch(err => {
                    showStatusMessage("ไม่สามารถเปิดกล้องได้: โปรดตรวจสอบสิทธิ์กล้องหรือเปิดผ่านลิงก์ HTTPS", false);
                    stopScanner();
                });
            }, 300);
        }

        // ปิดกล้องสแกน
        function stopScanner() {
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
            
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById("camera-status").textContent = "ปิดอยู่";
                    document.getElementById("camera-dot").className = "w-2.5 h-2.5 rounded-full bg-red-500";
                    html5QrCode = null;
                    
                    // พับเก็บหน้าจอกล้องกลับคืนเพื่อให้รายงานแสดงผลเต็มจอ
                    toggleCameraUI(false);
                }).catch(err => {
                    console.error(err);
                    toggleCameraUI(false);
                });
            } else {
                document.getElementById("camera-status").textContent = "ปิดอยู่";
                document.getElementById("camera-dot").className = "w-2.5 h-2.5 rounded-full bg-red-500";
                toggleCameraUI(false);
            }
        }

        // ตรวจพบ QR Code/Barcode
        function onScanSuccess(decodedText, decodedResult) {
            if (scanCooldown && decodedText === lastScannedText) {
                return;
            }

            lastScannedText = decodedText;
            scanCooldown = true;
            setTimeout(() => { scanCooldown = false; }, 2000);

            const isDuplicate = scannedItems.some(item => item.code === decodedText);

            if (isDuplicate) {
                playBeep(true);
                flashScreen("bg-red-200");
                showStatusMessage("ซ้ำ! เคยสแกนแล้ว: " + decodedText, false);
                speakText("ซ้ำ");
                return;
            }

            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            scannedItems.unshift({
                code: decodedText,
                time: timeString
            });

            saveData();
            playBeep(false);
            flashScreen("bg-green-200");
            updateUI();
            showStatusMessage("สำเร็จ: " + decodedText, true);
        }

        function onScanFailure(error) {
            // ปล่อยว่างเพื่อรอตรวจจับเฟรมถัดไป
        }

        // กะพริบสีหน้าจอชั่วขณะ
        function flashScreen(colorClass) {
            const body = document.getElementById("body-container");
            body.classList.add(colorClass);
            setTimeout(() => {
                body.classList.remove(colorClass);
            }, 150);
        }

        // อัปเดตตารางข้อมูล
        function updateUI() {
            document.getElementById("scan-count").textContent = scannedItems.length;
            const listEl = document.getElementById("scan-list");
            const emptyState = document.getElementById("empty-state");

            if (scannedItems.length === 0) {
                listEl.innerHTML = "";
                listEl.appendChild(emptyState);
                emptyState.classList.remove("hidden");
                return;
            }

            emptyState.classList.add("hidden");
            listEl.innerHTML = "";

            scannedItems.forEach((item, index) => {
                const isLatest = index === 0;
                const itemDiv = document.createElement("div");
                itemDiv.className = `flex justify-between items-center p-3 rounded-lg border text-sm shadow-sm transition-all ${
                    isLatest ? 'bg-blue-50 border-blue-300 font-semibold ring-2 ring-blue-200' : 'bg-white border-gray-200'
                }`;
                
                itemDiv.innerHTML = `
                    <div class="flex flex-col min-w-0 pr-2">
                        <span class="text-gray-800 break-all select-all">${item.code}</span>
                        <span class="text-xxs text-gray-400 mt-1">อันดับที่ ${scannedItems.length - index} | เวลา: ${item.time}</span>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-500 hover:text-red-700 font-bold px-2 py-1 text-xs bg-red-50 hover:bg-red-100 rounded border border-red-200 flex-shrink-0">
                        ลบ
                    </button>
                `;
                listEl.appendChild(itemDiv);
            });
        }

        function removeItem(index) {
            if (confirm("ลบรายการนี้ใช่หรือไม่?")) {
                scannedItems.splice(index, 1);
                saveData();
                updateUI();
            }
        }

        function clearHistory() {
            if (scannedItems.length === 0) return;
            if (confirm("คุณต้องการลบข้อมูลสแกนทั้งหมดใช่หรือไม่?")) {
                scannedItems = [];
                saveData();
                updateUI();
                showStatusMessage("ล้างข้อมูลแล้ว", true);
            }
        }

        function copyToClipboard() {
            if (scannedItems.length === 0) {
                alert("ไม่มีข้อมูลที่จะคัดลอก");
                return;
            }
            const textToCopy = scannedItems.map(item => item.code).join('\n');
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("คัดลอกรหัสพัสดุทั้งหมดไปเก็บไว้แล้ว สามารถกดวางใน Line หรือช่องอื่น ๆ ได้ทันที");
            }).catch(err => {
                alert("เกิดปัญหาในการคัดลอกอัตโนมัติเนื่องจากเบราว์เซอร์");
            });
        }

        // ฟังก์ชัน Export ข้อมูลเป็น Excel (.csv) ป้องกันรหัสเพี้ยน
        function exportToExcel() {
            if (scannedItems.length === 0) {
                alert("ไม่มีข้อมูลสแกนสำหรับส่งออก");
                return;
            }

            let csvContent = "\uFEFF"; 
            csvContent += "ลำดับ,รหัสพัสดุ (Tracking),เวลาที่สแกน\n";

            scannedItems.forEach((item, index) => {
                const order = scannedItems.length - index;
                csvContent += `"${order}","=""${item.code}""","${item.time}"\n`;
            });

            const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const dateStr = `${year}-${month}-${date}`;
            
            link.setAttribute("href", url);
            link.setAttribute("download", `รายงานพัสดุ_${dateStr}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function saveData() {
            localStorage.setItem("scanned_trackings", JSON.stringify(scannedItems));
        }

        function showStatusMessage(message, isSuccess) {
            const statusEl = document.getElementById("status-message");
            statusEl.textContent = message;
            statusEl.classList.remove("hidden");
            
            if (isSuccess) {
                statusEl.className = "mx-4 mt-3 text-center text-xs font-semibold py-2 px-3 rounded-lg flex-shrink-0 bg-green-100 text-green-800 border border-green-200";
            } else {
                statusEl.className = "mx-4 mt-3 text-center text-xs font-semibold py-2 px-3 rounded-lg flex-shrink-0 bg-red-100 text-red-800 border border-red-200";
            }
        }
    </script>
</body>
</html>
