<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Code Package Scanner - Split Screen</title>
    <!-- เรียกใช้งาน Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้งาน Library สแกน QR Code -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 h-screen w-screen flex flex-col font-sans overflow-hidden transition-colors duration-150" id="body-container">

    <!-- Header (ส่วนหัว) -->
    <header class="bg-blue-600 text-white py-3 px-4 shadow flex justify-between items-center flex-shrink-0">
        <div>
            <h1 class="text-lg font-bold">เช็คพัสดุ</h1>
            <p class="text-xxs text-blue-100">ตรวจสอบก่อนจัดส่ง</p>
        </div>
        <!-- ตัวนับจำนวน แสดงขนาดใหญ่เห็นชัดที่มุมขวาบน -->
        <div class="text-right">
            <div class="text-xxs text-blue-200 uppercase">สแกนแล้ว</div>
            <div class="text-2xl font-black"><span id="scan-count">0</span> รายการ</div>
        </div>
    </header>

    <!-- ครึ่งบน: ส่วนของกล้องสแกน -->
    <div class="w-full bg-black flex-shrink-0 relative" style="height: 40vh; min-height: 200px;">
        <!-- ตัวแสดงกล้อง -->
        <div id="reader" class="w-full h-full"></div>
        
        <!-- แถบแจ้งสถานะกล้องลอยทับบนกล้อง -->
        <div class="absolute top-2 left-2 bg-black/60 text-white text-xs px-2.5 py-1 rounded-full flex items-center gap-1.5 backdrop-blur-sm">
            <span id="camera-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></span>
            <span id="camera-status">ปิดอยู่</span>
        </div>
    </div>

    <!-- แถบควบคุมตรงกลาง (กล้องควบคุม / เคลียร์ข้อมูล) -->
    <div class="bg-white px-4 py-2 border-b flex justify-between items-center gap-2 flex-shrink-0 shadow-sm">
        <div class="flex gap-2">
            <button id="btn-start" onclick="startScanner()" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg text-xs transition-colors shadow">
                เปิดกล้อง
            </button>
            <button id="btn-stop" onclick="stopScanner()" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-4 rounded-lg text-xs transition-colors shadow" disabled>
                ปิดกล้อง
            </button>
        </div>
        <div class="flex gap-1.5">
            <button onclick="copyToClipboard()" class="bg-gray-800 text-white text-xs font-semibold py-2 px-3 rounded-md shadow">
                คัดลอกทั้งหมด
            </button>
            <button onclick="clearHistory()" class="bg-gray-100 text-red-600 border border-gray-200 text-xs font-semibold py-2 px-3 rounded-md">
                ล้างข้อมูล
            </button>
        </div>
    </div>

    <!-- ครึ่งล่าง: แสดงรหัสสแกนล่าสุดและการแจ้งเตือน -->
    <div class="flex-1 flex flex-col min-h-0 bg-gray-50">
        <!-- แสดงข้อความสถานะล่าสุด -->
        <div id="status-message" class="mx-4 mt-3 text-center text-xs font-semibold py-2 px-3 rounded-lg hidden flex-shrink-0"></div>

        <!-- รายการประวัติที่สแกนแล้ว -->
        <div class="flex-1 overflow-y-auto px-4 py-3">
            <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">ประวัติการสแกน (รายการล่าสุดจะอยู่บนสุด)</h2>
            <div id="scan-list" class="space-y-2">
                <!-- รายการจะเพิ่มเข้ามาจาก JS -->
                <p id="empty-state" class="text-sm text-gray-400 text-center py-10">ยังไม่มีข้อมูล โปรดกดปุ่ม "เปิดกล้อง" และเริ่มสแกน</p>
            </div>
        </div>
    </div>

    <script>
        let scannedItems = [];
        let html5QrCode = null;
        let lastScannedText = "";
        let scanCooldown = false;

        window.onload = function() {
            const savedData = localStorage.getItem("scanned_trackings");
            if (savedData) {
                scannedItems = JSON.parse(savedData);
                updateUI();
            }
        };

        // ฟังก์ชันพูดแจ้งเตือน (Text-to-Speech)
        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // ล้างคำพูดเก่าทันทีเพื่อให้เสียงไม่ทับกัน
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'th-TH'; // ภาษาไทย
                utterance.rate = 1.2; // ความเร็วในการพูด (ปรับให้เร็วขึ้นเล็กน้อย)
                window.speechSynthesis.speak(utterance);
            }
        }

        // เสียงบี๊บเตือน
        function playBeep(isDouble = false) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                function triggerBeep(timeOffset) {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.frequency.value = isDouble ? 500 : 1000; // เสียงบี๊บปกติโทนสูง เสียงเตือนซ้ำโทนต่ำ
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime + timeOffset);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeOffset + 0.1);
                    oscillator.start(audioCtx.currentTime + timeOffset);
                    oscillator.stop(audioCtx.currentTime + timeOffset + 0.1);
                }

                triggerBeep(0);
                if (isDouble) {
                    triggerBeep(0.12); // บี๊บสองทีเมื่อสแกนซ้ำ
                }
            } catch (e) {
                console.log(e);
            }
        }

        // เริ่มเปิดกล้อง
        function startScanner() {
            if (html5QrCode && html5QrCode.isScanning) return;

            document.getElementById("btn-start").disabled = true;
            document.getElementById("btn-stop").disabled = false;
            document.getElementById("camera-status").textContent = "กำลังเปิด...";
            document.getElementById("camera-dot").className = "w-2.5 h-2.5 rounded-full bg-yellow-500 animate-pulse";

            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 15, 
                qrbox: function(width, height) {
                    const minEdge = Math.min(width, height);
                    const size = Math.floor(minEdge * 0.7);
                    return { width: size, height: size };
                }
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess,
                onScanFailure
            ).then(() => {
                document.getElementById("camera-status").textContent = "พร้อมใช้งาน";
                document.getElementById("camera-dot").className = "w-2.5 h-2.5 rounded-full bg-green-500 animate-ping";
            }).catch(err => {
                showStatusMessage("ไม่สามารถเปิดกล้องได้: โปรดตรวจสอบสิทธิ์กล้องหรือเปิดผ่านลิงก์ HTTPS", false);
                stopScanner();
            });
        }

        // ปิดกล้อง
        function stopScanner() {
            document.getElementById("btn-start").disabled = false;
            document.getElementById("btn-stop").disabled = true;
            
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById("camera-status").textContent = "ปิดอยู่";
                    document.getElementById("camera-dot").className = "w-2.5 h-2.5 rounded-full bg-red-500";
                    html5QrCode = null;
                }).catch(err => {
                    console.error(err);
                });
            } else {
                document.getElementById("camera-status").textContent = "ปิดอยู่";
                document.getElementById("camera-dot").className = "w-2.5 h-2.5 rounded-full bg-red-500";
            }
        }

        // ตรวจพบ QR Code/Barcode
        function onScanSuccess(decodedText, decodedResult) {
            // ป้องกันการสแกนใบเดิมซ้ำติดต่อกันเร็วเกินไป (หน่วง 2 วินาที)
            if (scanCooldown && decodedText === lastScannedText) {
                return;
            }

            lastScannedText = decodedText;
            scanCooldown = true;
            setTimeout(() => { scanCooldown = false; }, 2000);

            // ตรวจสอบข้อมูลซ้ำในระบบ
            const isDuplicate = scannedItems.some(item => item.code === decodedText);

            if (isDuplicate) {
                playBeep(true); // เสียงบี๊บเตือนซ้ำโทนต่ำสองครั้ง
                flashScreen("bg-red-200");
                showStatusMessage("ซ้ำ! เคยสแกนแล้ว: " + decodedText, false);
                speakText("ซ้ำ"); // ส่งเสียงพูดเฉพาะคำว่า "ซ้ำ"
                return;
            }

            // บันทึกรายการใหม่
            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            scannedItems.unshift({
                code: decodedText,
                time: timeString
            });

            saveData();
            playBeep(false); // เสียงบี๊บปกติแบบสั้นโทนสูง
            flashScreen("bg-green-200"); // กะพริบจอสีเขียวอ่อน
            updateUI();
            showStatusMessage("สำเร็จ: " + decodedText, true);
        }

        function onScanFailure(error) {
            // ปล่อยว่างเพื่อรอรับข้อมูลภาพเฟรมถัดไป
        }

        // กะพริบสีหน้าจอชั่วขณะ
        function flashScreen(colorClass) {
            const body = document.getElementById("body-container");
            body.classList.add(colorClass);
            setTimeout(() => {
                body.classList.remove(colorClass);
            }, 150);
        }

        // อัปเดตตารางข้อมูล
        function updateUI() {
            document.getElementById("scan-count").textContent = scannedItems.length;
            const listEl = document.getElementById("scan-list");
            const emptyState = document.getElementById("empty-state");

            if (scannedItems.length === 0) {
                listEl.innerHTML = "";
                listEl.appendChild(emptyState);
                emptyState.classList.remove("hidden");
                return;
            }

            emptyState.classList.add("hidden");
            listEl.innerHTML = "";

            scannedItems.forEach((item, index) => {
                const isLatest = index === 0;
                itemDiv = document.createElement("div");
                itemDiv.className = `flex justify-between items-center p-3 rounded-lg border text-sm shadow-sm transition-all ${
                    isLatest ? 'bg-blue-50 border-blue-300 font-semibold ring-2 ring-blue-200' : 'bg-white border-gray-200'
                }`;
                
                itemDiv.innerHTML = `
                    <div class="flex flex-col min-w-0 pr-2">
                        <span class="text-gray-800 break-all select-all">${item.code}</span>
                        <span class="text-xxs text-gray-400 mt-1">อันดับที่ ${scannedItems.length - index} | เวลา: ${item.time}</span>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-500 hover:text-red-700 font-bold px-2 py-1 text-xs bg-red-50 hover:bg-red-100 rounded border border-red-200 flex-shrink-0">
                        ลบ
                    </button>
                `;
                listEl.appendChild(itemDiv);
            });
        }

        function removeItem(index) {
            if (confirm("ลบรายการนี้ใช่หรือไม่?")) {
                scannedItems.splice(index, 1);
                saveData();
                updateUI();
            }
        }

        function clearHistory() {
            if (scannedItems.length === 0) return;
            if (confirm("คุณต้องการลบข้อมูลสแกนทั้งหมดใช่หรือไม่?")) {
                scannedItems = [];
                saveData();
                updateUI();
                showStatusMessage("ล้างข้อมูลแล้ว", true);
            }
        }

        function copyToClipboard() {
            if (scannedItems.length === 0) {
                alert("ไม่มีข้อมูลที่จะคัดลอก");
                return;
            }
            const textToCopy = scannedItems.map(item => item.code).join('\n');
            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("คัดลอกรหัสพัสดุทั้งหมดไปเก็บไว้แล้ว สามารถกดวางใน Line หรือช่องอื่น ๆ ได้ทันที");
            }).catch(err => {
                alert("เกิดปัญหาในการคัดลอกอัตโนมัติเนื่องจากเบราว์เซอร์");
            });
        }

        function saveData() {
            localStorage.setItem("scanned_trackings", JSON.stringify(scannedItems));
        }

        function showStatusMessage(message, isSuccess) {
            const statusEl = document.getElementById("status-message");
            statusEl.textContent = message;
            statusEl.classList.remove("hidden");
            
            if (isSuccess) {
                statusEl.className = "mx-4 mt-3 text-center text-xs font-semibold py-2 px-3 rounded-lg flex-shrink-0 bg-green-100 text-green-800 border border-green-200";
            } else {
                statusEl.className = "mx-4 mt-3 text-center text-xs font-semibold py-2 px-3 rounded-lg flex-shrink-0 bg-red-100 text-red-800 border border-red-200";
            }
        }
    </script>
</body>
</html>
